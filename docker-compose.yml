# Finsight OS — one-command local stack
#
# Usage:
#   docker compose up
#
# Then open http://localhost:3000 in your browser.
#
# What you get:
#   • Backend (FastAPI + Ollama + gemma4:e2b) on :8000 / Ollama on :11434
#   • Frontend (Next.js production build) on :3000
#   • Persistent SQLite databases at backend/data/ (mapped via volume)
#
# What you DON'T get vs. the native install:
#   • Live Kite Connect — works, but you must edit backend/.env BEFORE
#     `docker compose up` to set KITE_API_KEY etc. The compose file passes
#     env_file through.
#   • GPU acceleration — to enable, uncomment the deploy block in the
#     backend service AND set OLLAMA_NUM_GPU=99 in backend/.env.
#     Requires nvidia-container-toolkit on the host.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    image: finsight-os-backend:latest
    container_name: finsight-backend
    ports:
      - "8000:8000"
      - "11434:11434"        # Ollama, in case you want to inspect it directly
    volumes:
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env       # auto-created from .env.example if missing — see README
    environment:
      - FRONTEND_URL=http://localhost:3000
    restart: unless-stopped
    # ── Uncomment the next 7 lines to use a GPU on a Linux host ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build: ./frontend
    image: finsight-os-frontend:latest
    container_name: finsight-frontend
    ports:
      - "3000:3000"
    environment:
      # Inside the docker network, the backend resolves as `backend:8000`.
      # But the browser is on the host, so it must hit localhost:8000.
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
